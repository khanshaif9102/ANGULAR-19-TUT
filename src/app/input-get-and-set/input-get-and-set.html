<h1>Get and Set Input field Value</h1>

<h1>username name is :{{displayName}}</h1>

<input (input)="getName($event)" value="{{name}}" type="text" placeholder="Enter username">

<br>
<br>
<br>

<button (click)="showName()">Get Name</button>
<button (click)="setName()">Set Value</button>
<hr>


<h1>Email is : {{email}}</h1>

<input type="text" placeholder="enter email" value="{{email}}" #emailFeild>

<button (click)="getEmail(emailFeild.value)">Get Email</button>
<button (click)="setEmail()">Set Email</button>
