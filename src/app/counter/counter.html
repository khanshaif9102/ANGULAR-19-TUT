<h1>Counter App</h1>

<div style="text-align: center;">
    <h2 class="count">{{count}}</h2>
    <div>
        <button class="btn bg-red" (click)="handleCounter('decreament')">Decreament</button>
        <button class="btn bg-black" (click)="handleCounter('reset')">Reset</button>
        <button class="btn bg-green" (click)="handleCounter('increament')">Increament</button>
    </div>
</div>
